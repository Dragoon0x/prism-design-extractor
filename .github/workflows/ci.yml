name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Typecheck / Lint / Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test:unit

  # Vision accuracy gate. Set repo var ENABLE_EVAL_GATE=true to activate,
  # and secret ANTHROPIC_API_KEY_EVAL to a key that can call Sonnet vision.
  eval:
    name: Vision Eval Harness
    runs-on: ubuntu-latest
    needs: checks
    if: ${{ vars.ENABLE_EVAL_GATE == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Bootstrap a synthetic fixture set if the repo doesn't already ship real ones.
      - run: |
          if ! compgen -G "fixtures/images/*" > /dev/null; then
            pnpm --filter @prism/eval run synthesize
          fi
      - run: pnpm eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_EVAL }}
          PRISM_F1_THRESHOLD: ${{ vars.PRISM_F1_THRESHOLD || '0.80' }}
          PRISM_EVAL_REPORT: eval-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report
          path: eval-report.json
